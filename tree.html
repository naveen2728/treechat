<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="tree.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Conversation sidebar">
        <div class="brand">
          <span class="brand-mark">B</span>
          <span>Branch Chat</span>
        </div>
        <button class="sidebar-newchat" id="sidebarNewChatBtn" type="button">New chat</button>
        <div class="sidebar-search-wrap">
          <input
            class="sidebar-search"
            id="sidebarSearch"
            type="search"
            placeholder="Search chats"
            aria-label="Search chats"
          />
        </div>
        <div class="sidebar-section">
          <span class="sidebar-label">Chats</span>
          <div class="conversation-list" id="conversationList"></div>
        </div>
      </aside>

      <main class="main-stage">
        <div class="page-title">Branch Chat &#127795;</div>

        <div class="chat-shell" role="application" aria-label="Chat interface">
          <div class="chat-header">
            <div class="chat-title">
              <strong>Chat</strong>
              <span>Send normally. Use Branch only when you want a side path.</span>
            </div>
            <div class="chat-actions">
              <button class="help-btn" id="tutorialBtn" type="button" aria-label="How TreeChat works">
                <span class="help-btn-icon">?</span>
                <span class="help-btn-label">Guide</span>
              </button>
              <button class="settings-btn" id="settingsBtn" type="button" aria-label="Settings">
                Settings
              </button>
              <button class="export-btn" id="exportBtn" type="button" aria-label="Export Chat">
                Export
              </button>
              <button class="newchat-btn" id="newChatBtn" type="button" aria-label="New Chat">
                New Chat
              </button>
            </div>
          </div>

          <div class="chat-messages" id="messages" aria-live="polite"></div>

          <div class="chat-footer">
            <form id="chatForm">
              <textarea
                id="messageInput"
                class="input"
                placeholder="Message Branch Chat..."
                aria-label="Message input"
                rows="1"
              ></textarea>
              <button class="btn" id="sendBtn" type="submit">Send</button>
            </form>
            <div class="hint">Enter sends. Shift + Enter adds a new line.</div>
          </div>
        </div>
      </main>
    </div>

    <div class="tutorial-modal is-hidden" id="tutorialModal" aria-hidden="true">
      <div
        class="tutorial-dialog"
        role="dialog"
        aria-modal="false"
        aria-labelledby="tutorialTitle"
        aria-describedby="tutorialBody"
      >
        <div class="tutorial-dialog-header">
          <div>
            <span class="tutorial-eyebrow">Welcome to TreeChat</span>
            <h2 id="tutorialTitle">See how branching works</h2>
          </div>
          <button class="tutorial-close" id="tutorialCloseBtn" type="button" aria-label="Close tutorial">
            Close
          </button>
        </div>

        <div class="tutorial-slide" id="tutorialSlide"></div>

        <div class="tutorial-dialog-footer">
          <div class="tutorial-dots" id="tutorialDots" aria-label="Tutorial progress"></div>
          <div class="tutorial-dialog-actions">
            <button class="tutorial-secondary-btn" id="tutorialPrevBtn" type="button">Back</button>
            <button class="tutorial-primary-btn" id="tutorialNextBtn" type="button">Next</button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-layer" id="toastLayer" aria-live="polite"></div>
    <script src="tree.js"></script>
  </body>
</html>
