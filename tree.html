<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="tree.css" />
  </head>
  <body>
    <div class="auth-shell" id="authShell">
      <div class="auth-panel">
        <div class="auth-brand">
          <span class="brand-mark">B</span>
          <span>Branch Chat</span>
        </div>
        <div class="auth-copy">
          <strong>Sign in to your chats</strong>
          <span>Keep your conversations synced to your own account.</span>
        </div>
        <form id="authForm" class="auth-form">
          <div class="auth-mode-toggle">
            <button type="button" class="auth-mode-btn is-active" id="signInModeBtn">Sign in</button>
            <button type="button" class="auth-mode-btn" id="signUpModeBtn">Create account</button>
          </div>
          <label class="auth-field">
            <span>Email</span>
            <input id="authEmail" type="email" autocomplete="email" required />
          </label>
          <label class="auth-field">
            <span>Password</span>
            <input id="authPassword" type="password" autocomplete="current-password" required />
          </label>
          <button id="authSubmitBtn" class="auth-submit-btn" type="submit">Sign in</button>
        </form>
        <div class="auth-status" id="authStatus" aria-live="polite"></div>
      </div>
    </div>

    <div class="app-shell is-hidden" id="appShell">
      <aside class="sidebar" aria-label="Conversation sidebar">
        <div class="brand">
          <span class="brand-mark">B</span>
          <span>Branch Chat</span>
        </div>
        <button class="sidebar-newchat" id="sidebarNewChatBtn" type="button">New chat</button>
        <div class="sidebar-section">
          <span class="sidebar-label">Chats</span>
          <div class="conversation-list" id="conversationList"></div>
        </div>
      </aside>

      <main class="main-stage">
        <div class="page-title">Branch Chat &#127795;</div>

        <div class="chat-shell" role="application" aria-label="Chat interface">
          <div class="chat-header">
            <div class="chat-title">
              <strong>Chat</strong>
              <span>Send normally. Use Branch only when you want a side path.</span>
            </div>
            <div class="chat-actions">
              <span class="user-pill" id="userPill"></span>
              <button class="logout-btn" id="logoutBtn" type="button" aria-label="Log out">
                Log out
              </button>
              <button class="settings-btn" id="settingsBtn" type="button" aria-label="Settings">
                Settings
              </button>
              <button class="export-btn" id="exportBtn" type="button" aria-label="Export Chat">
                Export
              </button>
              <button class="newchat-btn" id="newChatBtn" type="button" aria-label="New Chat">
                New Chat
              </button>
            </div>
          </div>

          <div class="chat-messages" id="messages" aria-live="polite"></div>

          <div class="chat-footer">
            <form id="chatForm">
              <textarea
                id="messageInput"
                class="input"
                placeholder="Message Branch Chat..."
                aria-label="Message input"
                rows="1"
              ></textarea>
              <button class="btn" id="sendBtn" type="submit">Send</button>
            </form>
            <div class="hint">Enter sends. Shift + Enter adds a new line.</div>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="tree.js"></script>
  </body>
</html>
